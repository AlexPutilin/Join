<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>add Task</title>
    <link rel="shortcut icon" href="../assets/img/logo.svg" type="image/x-icon">

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/sidebar-hug.css">
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/addTask.css">

    <script src="../js/api.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/templates.js"></script>
    <script src="../js/addTask.js"></script>
    <script src="../js/contacts.js"></script>
</head>

<body>
    <aside>
        <img class="logo-white" src="../assets/img/logo-white.svg" alt="Join Logo">
        <nav>
            <div class="navigate-btn-wrapper">
                <button onclick="openPage('summary.html')" class="btn-menu">
                    <div class="icon-wrapper">
                        <img class="icon-default" src="../assets/img/icon-summary.svg" alt="summary icon">
                        <img class="icon-active" src="../assets/img/icon-summary-active.svg" alt="summary active icon">
                    </div>
                    <span>Summary</span>
                </button>

                <button onclick="openPage('addTask.html')" class="btn-menu menu-active">
                    <div class="icon-wrapper">
                        <img class="icon-default" src="../assets/img/icon-task.svg" alt="add task icon">
                        <img class="icon-active" src="../assets/img/icon-task-active.svg" alt="add task active icon">
                    </div>
                    <span>Add Task</span>
                </button>

                <button onclick="openPage('board.html')" class="btn-menu btn-board">
                    <div class="icon-wrapper">
                        <img class="icon-default" src="../assets/img/icon-board.svg" alt="board icon">
                        <img class="icon-active" src="../assets/img/icon-board-active.svg" alt="board active icon">
                    </div>
                    <span>Board</span>
                </button>

                <button onclick="openPage('contacts.html')" class="btn-menu btn-contacts">
                    <div class="icon-wrapper">
                        <img class="icon-default" src="../assets/img/icon-contacts.svg" alt="contacts icon">
                        <img class="icon-active" src="../assets/img/icon-contacts-active.svg"
                            alt="contacts active icon">
                    </div>
                    <span>Contacts</span>
                </button>
            </div>
            <div class="legal-informations-wrapper">
                <a class="" href="privacy-policy.html">Privacy Policy</a>
                <a class="" href="legal-notice.html">Legal Notice</a>
            </div>
        </nav>
    </aside>
    <main>
        <section class="hug">
            <p class="kanban-text">
                Kanban Project Management Tool</p>
            <div class="help-and-profile">

                    <button onclick="openPage('help.html')" class="btn-small">
                        <img class="icon-default" src="../assets/img/icon-help-efault.svg" alt="help icon">
                        <img class="icon-hover" src="../assets/img/icon-help-hover.svg" alt="help icon">
                    </button>

                    <button class="btn-profile">
                        <span>ds</span>
                    </button>
                </div>
            </div>
        </section>
        <section class="navbar-mobile">
            <div class="navbar-mobile-wrapper">
                <button onclick="openPage('summary.html')" class="btn-menu-mobile">
                    <div class="">
                        <img class="icon-default" src="../assets/img/icon-summary.svg" alt="summary icon">
                        <img class="icon-active" src="../assets/img/icon-summary-active.svg" alt="summary active icon">
                    </div>
                    <span>Summary</span>
                </button>

                <button onclick="openPage('addTask.html')" class="btn-menu-mobile menu-active">
                    <div class="">
                        <img class="icon-default" src="../assets/img/icon-task.svg" alt="add task icon">
                        <img class="icon-active" src="../assets/img/icon-task-active.svg" alt="add task active icon">
                    </div>
                    <span>Add Tasks</span>
                </button>

                <button onclick="openPage('board.html')" class="btn-menu-mobile">
                    <div class="">
                        <img class="icon-default" src="../assets/img/icon-board.svg" alt="board icon">
                        <img class="icon-active" src="../assets/img/icon-board-active.svg" alt="board active icon">
                    </div>
                    <span>Board</span>
                </button>

                <button onclick="openPage('contacts.html')" class="btn-menu-mobile">
                    <div class="">
                        <img class="icon-default" src="../assets/img/icon-contacts.svg" alt="contacts icon">
                        <img class="icon-active" src="../assets/img/icon-contacts-active.svg"
                            alt="contacts active icon">
                    </div>
                    <span>Contacts</span>
                </button>
            </div>
        </section>

        <section class="add-task-form">
          <div><h1>Add Task</h1></div>
        
          <form id="add-task-form">
            <div class="add-task-container">
              <div class="add-task-left">
                
                <div class="input-wrapper">
                  <div class="required-description">
                    <span>Title</span><span class="redstar">*</span>
                  </div>
                  <div class="input-area">
                    <input id="task-title" name="title" type="text" placeholder="Enter a title" required oninput="resetInputError()">
                  </div>
                  <span class="err-msg hidden">This field is required.</span>
                </div>
        
                <div class="input-wrapper">
                  <span>Description</span>
                  <div class="textarea">
                    <textarea name="description_full" placeholder="Enter a description"></textarea>
                  </div>
                </div>
        

                <div class="input-wrapper">
                  <div class="required-description">
                    <span>Due date</span><span class="redstar">*</span>
                  </div>
                  <div class="input-area">
                    <input id="due-date" name="due_date" type="date" required>
                  </div>
                </div>
              </div>
        
                <div class="add-task-right">

                <div id="priority-wrapper-template"></div>

                <div id="assigned-to-wrapper-template"></div>
        
                <div id="category-wrapper-template"></div>

                <div id="subtask-wrapper-template" class="subtasks-container"></div>
        
                </div>
              </div>
            </div>
          </form>
        

          <div class="clear-save-btn-wrapper">
            <div class="clear-save-btn">
              <div class="required-description">
                <p class="redstar">*</p><p>This field is required</p>
              </div>
              <div class="clear-save-btn-pos">
                <button type="button" class="btn-light" onclick="clearAddTaskForm()">
                  <span>Clear</span>
                  <div class="icon-wrapper">
                    <img class="icon-default" src="../assets/img/icon-cancel-default.svg">
                    <img class="icon-hover"   src="../assets/img/icon-cancel-hover.svg">
                    <img class="icon-active"  src="../assets/img/icon-cancel-click.svg">
                  </div>
                </button>
                <button type="button" class="btn-dark" id="create-task-btn" onclick="addTask()">
                  <span>Create Task</span>
                  <img src="../assets/img/icon-add-white.svg">
                </button>
              </div>
            </div>
          </div>
        </section>
    </main>

</body>

</html>
