<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>add Task</title>
    <link rel="shortcut icon" href="../assets/img/logo.svg" type="image/x-icon">

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/sidebar-hug.css">
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/addTask.css">

    <script src="../js/components.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/addTask.js"></script>
</head>

<body onload="init()">
    <aside>
        <img class="logo" src="../assets/img/logo-white.svg" alt="Join Logo">
        <nav>
            <button onclick="openPage('summary.html')" class="btn-menu">
                <div class="icon-wrapper">
                    <img class="icon-default" src="../assets/img/icon-summary.svg" alt="summary icon">
                    <img class="icon-active" src="../assets/img/icon-summary-active.svg" alt="summary active icon">
                </div>
                <span>Summary</span>
            </button>

            <button onclick="openPage('addTask.html')" class="btn-menu menu-active">
                <div class="icon-wrapper">
                    <img class="icon-default" src="../assets/img/icon-task.svg" alt="add task icon">
                    <img class="icon-active" src="../assets/img/icon-task-active.svg" alt="add task active icon">
                </div>
                <span>Add Task</span>
            </button>

            <button onclick="openPage('board.html')" class="btn-menu btn-board">
                <div class="icon-wrapper">
                    <img class="icon-default" src="../assets/img/icon-board.svg" alt="board icon">
                    <img class="icon-active" src="../assets/img/icon-board-active.svg" alt="board active icon">
                </div>
                <span>Board</span>
            </button>

            <button onclick="openPage('contacts.html')" class="btn-menu btn-contacts">
                <div class="icon-wrapper">
                    <img class="icon-default" src="../assets/img/icon-contacts.svg" alt="contacts icon">
                    <img class="icon-active" src="../assets/img/icon-contacts-active.svg" alt="contacts active icon">
                </div>
                <span>Contacts</span>
            </button>

        </nav>

        <div class="legal">
            <a class="" href="privacy-policy.html">Privacy Policy</a>
            <a class="" href="legal-notice.html">Legal notice</a>
        </div>
    </aside>
    <main>
        <section class="hug">
            <span class="kanban-text">
                Kanban Project Management Tool</span>
            <div class="help-and-profile">

                <button onclick="openPage('help.html')" class="btn-small">
                    <img class="icon-default" src="../assets/img/icon-help-efault.svg" alt="help icon">
                    <img class="icon-hover" src="../assets/img/icon-help-hover.svg" alt="help icon">
                </button>

                <button class="btn-profile">
                    <span>ds</span>
                </button>
            </div>
        </section>

        <section class="add-task-form">
            <div>
            <h1>Add Task</h1>
            </div>
            <div class="add-task-container">
        
                <div class="add-task-left">
                    <div class="input-wrapper">
                        <div class="required-description">
                        <span>Title</span>
                        <span class="redstar">*</span>
                    </div>
                        <div class="input-area">
                            <input type="text" placeholder="Enter a title" required oninput="resetInputError()">
                        </div>
                        <span class="err-msg hidden">This field is required.</span>
                    </div>
        
                    <div class="input-wrapper">
                        <span>Description</span>
                        <div class="textarea">
                            <textarea placeholder="Enter a description"></textarea>
                        </div>
                    </div>
        
                    <div class="input-wrapper">
                        <div class="required-description">
                        <span>Due date</span>
                        <span class="redstar">*</span>
                    </div>
                        <div class="input-area">
                            <input type="date" required>
                        </div>
                    </div>
                </div>
        
                <div class="add-task-right">
                    <div class="input-wrapper">
                        <span>Priority</span>
                        <div class="priority-buttons">
                            <label class="priority-option urgent">
                                <input type="radio" name="priority" value="urgent" hidden>
                                <span>Urgent</span>
                                <img src="../assets/img/icon-prio-urgent.svg" alt="">
                                <div class="bg-checked"></div>
                            </label>
                            <label class="priority-option medium">
                                <input type="radio" name="priority" value="medium" hidden>
                                <span>Medium</span>
                                <img src="../assets/img/icon-prio-medium.svg" alt="">
                                <div class="bg-checked"></div>
                            </label>
                            <label class="priority-option low">
                                <input type="radio" name="priority" value="low" hidden>
                                <span>Low</span>
                                <img src="../assets/img/icon-prio-low.svg" alt="">
                                <div class="bg-checked"></div>
                            </label>
                        </div>
                    </div>
        

                    <div class="input-wrapper">
                        <div class="required-description">
                            <span>Assigned to</span>
                        </div>
                        <div class="input-area drop-down-input">
                            <input type="text" placeholder="Select contacts to assign" data-placeholder="Select contacts to assign" data-placeholder-active="">
                            <button type="button" class="btn-small" onclick="toggleDropDown(this)">
                                <div class="icon-wrapper">
                                    <img class="icon-default" src="../assets/img/icon-down-default.svg">
                                    <img class="icon-hover" src="../assets/img/icon-down-hover.svg">
                                </div>
                                <div class="icon-wrapper d-none">
                                    <img class="icon-default" src="../assets/img/icon-up-default.svg">
                                    <img class="icon-hover" src="../assets/img/icon-up-hover.svg">
                                </div>
                            </button>
                        </div>
                    <div class="drop-down-menu d-none" data-open="false">
                        <div class="select-contact">
                            <div>
                                <div class="icon-contact">PA</div>
                                <span>Person A</span>
                            </div>
                            <label class="checkbox">
                                <input type="checkbox" hidden>
                                <div class="icon-wrapper icon-checkbox-default">
                                    <img class="icon-default" src="../assets/img/icon-checkbutton-default.svg">
                                    <img class="icon-hover" src="../assets/img/icon-checkbutton-hover.svg">
                                </div>
                                <div class="icon-wrapper icon-checkbox-checked">
                                    <img class="icon-default" src="../assets/img/icon-checkbutton-checked-default.svg">
                                    <img class="icon-hover" src="../assets/img/icon-checkbutton-checked-hover.svg">
                                </div>
                            </label>
                        </div>
                        <div class="select-contact">
                            <div>
                                <div class="icon-contact">PA</div>
                                <span>Person A</span>
                            </div>
                            <label class="checkbox">
                                <input type="checkbox" hidden>
                                <div class="icon-wrapper icon-checkbox-default">
                                    <img class="icon-default" src="../assets/img/icon-checkbutton-default.svg">
                                    <img class="icon-hover" src="../assets/img/icon-checkbutton-hover.svg">
                                </div>
                                <div class="icon-wrapper icon-checkbox-checked">
                                    <img class="icon-default" src="../assets/img/icon-checkbutton-checked-default.svg">
                                    <img class="icon-hover" src="../assets/img/icon-checkbutton-checked-hover.svg">
                                </div>
                            </label>
                        </div>
                        <div class="select-contact">
                            <div>
                                <div class="icon-contact">PA</div>
                                <span>Person A</span>
                            </div>
                            <label class="checkbox">
                                <input type="checkbox" hidden>
                                <div class="icon-wrapper icon-checkbox-default">
                                    <img class="icon-default" src="../assets/img/icon-checkbutton-default.svg">
                                    <img class="icon-hover" src="../assets/img/icon-checkbutton-hover.svg">
                                </div>
                                <div class="icon-wrapper icon-checkbox-checked">
                                    <img class="icon-default" src="../assets/img/icon-checkbutton-checked-default.svg">
                                    <img class="icon-hover" src="../assets/img/icon-checkbutton-checked-hover.svg">
                                </div>
                            </label>
                        </div>
                        <div class="select-contact">
                            <div>
                                <div class="icon-contact">PA</div>
                                <span>Person A</span>
                            </div>
                            <label class="checkbox">
                                <input type="checkbox" hidden>
                                <div class="icon-wrapper icon-checkbox-default">
                                    <img class="icon-default" src="../assets/img/icon-checkbutton-default.svg">
                                    <img class="icon-hover" src="../assets/img/icon-checkbutton-hover.svg">
                                </div>
                                <div class="icon-wrapper icon-checkbox-checked">
                                    <img class="icon-default" src="../assets/img/icon-checkbutton-checked-default.svg">
                                    <img class="icon-hover" src="../assets/img/icon-checkbutton-checked-hover.svg">
                                </div>
                            </label>
                        </div>
                        <div class="select-contact">
                            <div>
                                <div class="icon-contact">PA</div>
                                <span>Person A</span>
                            </div>
                            <label class="checkbox">
                                <input type="checkbox" hidden>
                                <div class="icon-wrapper icon-checkbox-default">
                                    <img class="icon-default" src="../assets/img/icon-checkbutton-default.svg">
                                    <img class="icon-hover" src="../assets/img/icon-checkbutton-hover.svg">
                                </div>
                                <div class="icon-wrapper icon-checkbox-checked">
                                    <img class="icon-default" src="../assets/img/icon-checkbutton-checked-default.svg">
                                    <img class="icon-hover" src="../assets/img/icon-checkbutton-checked-hover.svg">
                                </div>
                            </label>
                        </div>
                    </div>
                </div>


                <div class="input-wrapper">
                    <div class="required-description">
                        <span>Category</span>
                        <span class="redstar">*</span>
                    </div>
                    <div class="input-area drop-down-input">
                        <input type="text" placeholder="Select task category" data-placeholder="Select contacts to assign" data-placeholder-active="">
                        <button type="button" class="btn-small" onclick="toggleDropDown(this)">
                            <div class="icon-wrapper">
                                <img class="icon-default" src="../assets/img/icon-down-default.svg">
                                <img class="icon-hover" src="../assets/img/icon-down-hover.svg">
                            </div>
                            <div class="icon-wrapper d-none">
                                <img class="icon-default" src="../assets/img/icon-up-default.svg">
                                <img class="icon-hover" src="../assets/img/icon-up-hover.svg">
                            </div>
                        </button>
                    </div>
    
                


                   <!--
                    <div class="input-wrapper">
                        <div class="required-description">
                          <p>Category</p>
                          <p class="redstar">*</p>
                        </div>
                        <div class="custom-dropdown" id="category-dropdown">
                            <div class="dropdown-selected" id="selected-category" onclick="toggleCategoryDropdown()">Select task category</div>
                            <div class="dropdown-options hidden" id="category-options">
                              <div class="dropdown-single-option" data-value="technicalTask" onclick="selectCategory(this)">Technical Task</div>
                              <div class="dropdown-single-option" data-value="userStory" onclick="selectCategory(this)">User Story</div>
                            </div>
                          </div>                          
                        <span class="err-msg hidden" id="category-error">Please select a category.</span>
                      </div> 
                    -->
                      
                    <div class="input-wrapper">
                        <p>Subtasks</p>
                        <div class="input-area subtasks">
                            <input type="text" placeholder="Add new subtask">
                            <button class="subtask-btn">+</button>
                        </div>
                    </div>
                </div>
            </div>
              </div> 
              <div class="clear-save-btn-wrapper">
                <div class="clear-save-btn">
                  <div class="required-description">
                    <p class="redstar">*</p>
                    <p>This field is required</p>
                  </div>
              
                  <div class="clear-save-btn-pos">
                    <button class="btn-light">
                      <span>Cancel</span>
                      <div class="icon-wrapper">
                        <img class="icon-default" src="../assets/img/icon-cancel-default.svg">
                        <img class="icon-hover" src="../assets/img/icon-cancel-hover.svg">
                        <img class="icon-active" src="../assets/img/icon-cancel-click.svg">
                      </div>
                    </button>
              
                    <button class="btn-dark">
                      <span>Create Task</span>
                      <img src="../assets/img/icon-add-white.svg">
                    </button>
                  </div>
                </div>             
    </main>

</body>

</html>
